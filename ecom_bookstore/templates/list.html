{% extends 'base.html' %}
{% block content %}
<div class="row">
    {% for each in object_list %}
    <div class="col">
        <div class="container">
            <div class="row mx-auto">
        <div class="col-sm-6 col-md-3 col-lg-3">
        <div class="card" style="width: 13rem; ">
            <img src="{{ each.image_url}}" class="card-img-top" alt="..">
            <div class="card-body">
                <h5 class="card-title">{{ each.title}}</h5>
                <p class="card-text">Rs/-: {{each.price|floatformat:2}}</p>
                {% if each.book_available is True %}
                <li class="text-primary">Available</li>
                {% else %}
                <li class="text-danger">Out of stock!</li>
                {% endif %}
             <a href="{% url 'detail-view' each.id %} " class="btn btn-outline-dark">view</a>
            </div>
            </div>
        </div>
    </div>
        </div>
        </div>
     {% endfor %}
</div>
{% endblock content %}
