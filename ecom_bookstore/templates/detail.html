{% extends 'base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="card mb3" style="max-width:840px;">
    <div class="col-md-4">
        <img src="{{ object.image_url }}" class="card-img">
    </div>
    <div class="col-md-8">
        <div class="card-body">
            <h4 class="card-title">{{object.title}}</h4>
            <p class="card-text">{{object.description}}</p>
        </div>
    </div>
</div>
{% if object.book_available is True %}
<!--adding cart button-->
<!--<div class="buttons row flex" style="font-family: Rajdhani;">-->
<!--    <button type="submit" class="d-grid gap-2 btn1 btn btn-danger-->
<!--     p-1 m-1 btn-lg text-decoration-none text-white">Add to Cart</button>-->

<a href="{% url 'checkout-view' object.pk %}" class="btn btn-danger" role="button">Add to Cart</a><br>

<a href="{% url 'checkout-view' object.pk %}" class="btn btn-outline-success" role="button">Buy Now</a>
{% else %}
<h4 class="text-danger">Out of Stock..!</h4>
{% endif %}

</body>
</html>
{% endblock content%}
